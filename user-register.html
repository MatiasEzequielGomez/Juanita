    <h1>Formulario de registro</h1>
    
    <section>
     <form action="" method="post">
        <div>
            <label for="nombre-registro">Nombre</label>
            <input type="text" id="nombre-registro"name="nombre"required>
            <br><br>
            <label for="apellido-registro">Apellido</label>
            <input type="text" id="apellido-registro"name="apellido"required>
        </div>

        <div>
            <br><br>
            <label for="email-registro">Email</label>
            <input type="email" id="email-registro"name="email"required> 
            <br><br>
            <label for="password-registro">Contraseña</label>
            <input type="password" id="password-registro"name="password"required>
        </div>
        
        <div>
            <br><br>
            <label for="nacimiento-registro" >Fecha de nacimiento</label>
          <input type="date" id="nacimiento-registro" placeholder="dd/mm/aaaa" name="nacimiento"required>
        </div>
       
        <div>
            <br><br>
            <input type="submit" value="Confirmar">
        </div>
     </form>
    </section>
