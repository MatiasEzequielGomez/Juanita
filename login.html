<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="icon" type="image/icon" href="Images/LogoJuanita.ico"></head>
</head>
<body   class="bg-color">
    <form   class="card position-absolute top-50 start-50 translate-middle  centro">
        <h1 class="title-register">Juanita Lencería</h1>
        <h5 class="card-title mb-4" >Iniciar sesión</h5>
        <div class="mb-3">
          <label for="email-registro" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email-registro" name="email"required aria-describedby="emailHelp">
        </div>
        <div class="mb-3">
          <label for="password-registro" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password-registro"name="password"required>
        </div>
        <button type="submit" class="btn btn-primary" value="Ingresar">Ingresar</button>
      </form>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
      <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js" integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+" crossorigin="anonymous"></script>
</body>
</html>
